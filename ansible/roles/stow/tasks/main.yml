---
- name: Ensure ~/.config exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config"
    state: directory
    mode: "0755"

- name: Ensure ~/.local/bin exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/bin"
    state: directory
    mode: "0755"

- name: Remove conflicting default files that block stow
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/{{ item }}"
    state: absent
  loop:
    - .zshrc
    - .tmux.conf
    - .gitconfig
  when: dotfiles_force | default(false) | bool

- name: Stow dotfile packages
  ansible.builtin.command:
    cmd: "stow --target={{ ansible_env.HOME }} --restow {{ item }}"
    chdir: "{{ dotfiles_dir }}"
  loop:
    - gitconfig
    - local
    - nvim
    - skhd
    - tmux
    - yabai
    - zsh
  register: stow_result
  changed_when: stow_result.stdout != "" or stow_result.stderr != ""

- name: Ensure ~/.config subdirs for non-stow packages
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - alacritty
    - ghostty

- name: Symlink alacritty config
  ansible.builtin.file:
    src: "{{ dotfiles_dir }}/alacritty/alacritty.toml"
    dest: "{{ ansible_env.HOME }}/.config/alacritty/alacritty.toml"
    state: link
    force: true

- name: Symlink alacritty themes
  ansible.builtin.file:
    src: "{{ dotfiles_dir }}/alacritty/themes"
    dest: "{{ ansible_env.HOME }}/.config/alacritty/themes"
    state: link
    force: true

- name: Symlink ghostty config
  ansible.builtin.file:
    src: "{{ dotfiles_dir }}/ghostty/config"
    dest: "{{ ansible_env.HOME }}/.config/ghostty/config"
    state: link
    force: true
